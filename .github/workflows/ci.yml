name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'resources/**'
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # --ignore-scripts skips the postinstall electron-rebuild step.
        # CI only runs tsc + Vitest — it never launches Electron, so the
        # system-Node ABI DuckDB binary (installed by npm) is sufficient.
        # electron-rebuild is only needed for local `just dev` / `just release`.
        run: npm ci --ignore-scripts

      - name: Typecheck (master + renderer)
        run: npm run typecheck

      - name: Run tests with coverage (min 70 %)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
