name: Release

# Triggered by a semver tag: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── Build macOS DMG (arm64 + x64) ─────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    runs-on: macos-14   # Apple Silicon — electron-builder cross-compiles x64 via Rosetta

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Code-signing + notarization ────────────────────────────────────────
      # Signing and notarization are required to avoid "damaged app" errors on
      # macOS 13+ (Ventura/Sonoma). They are optional — the build produces an
      # unsigned DMG when the secrets are absent (useful for CI smoke-testing).
      #
      # To enable for production releases, add these GitHub Actions secrets:
      #   MAC_CERTIFICATE          — base64-encoded .p12:  base64 -i cert.p12 | pbcopy
      #   MAC_CERTIFICATE_PASSWORD — password used when exporting the .p12
      #   APPLE_ID                 — your Apple ID email (e.g. dev@example.com)
      #   APPLE_APP_SPECIFIC_PASSWORD — app-specific password from appleid.apple.com
      #   APPLE_TEAM_ID            — 10-char Team ID from developer.apple.com
      #
      # The certificate must be a "Developer ID Application" cert issued by Apple.
      #
      # IMPORTANT: CSC_LINK must never be set to an empty string — electron-builder
      # resolves "" to the CWD (a directory, not a .p12 file) and fails with
      # "not a file". The shell script below only exports CSC_LINK when the
      # secret is actually present; otherwise it disables auto-discovery entirely.
      - name: Build & package
        run: |
          if [ -n "$MAC_CERTIFICATE_B64" ]; then
            echo "$MAC_CERTIFICATE_B64" | base64 --decode > /tmp/cert.p12
            export CSC_LINK=/tmp/cert.p12
            echo "Code-signing enabled (Developer ID certificate found)"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "Code-signing disabled — producing unsigned DMG"
          fi

          # --publish never: electron-builder must not try to publish to GitHub
          # itself; the dedicated "Publish GitHub Release" job below handles that.
          npm run build && npx electron-builder --mac --publish never
        env:
          MAC_CERTIFICATE_B64:           ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD:              ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID:                      ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD:   ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:                 ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dmg-macos
          path: dist/*.dmg
          if-no-files-found: error

  # ── Create GitHub Release with the DMG files ──────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the release

    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          name: dmg-macos
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-beta.1
          body: |
            ## ⚠️ First launch on macOS — "Aperture is damaged" error

            macOS blocks apps that aren't notarized by Apple, showing _"Aperture is damaged and can't be opened."_ The app is **not** damaged — this is a Gatekeeper warning.

            **Fix (one-time, ~10 seconds):** open Terminal and run:
            ```bash
            xattr -cr /Applications/Aperture.app
            ```
            Then double-click the app normally.

            _Alternatively_: right-click **Aperture.app** → **Open** → click **Open** in the dialog.

            ---
